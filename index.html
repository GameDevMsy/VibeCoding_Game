<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE CODING GAMES - Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .dark .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
        }

        .light .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .light .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* 텍스트 네온 효과 */
        .neon-text {
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 애니메이션 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .light ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="dark bg-slate-950 text-slate-100 min-h-screen">

    <!-- 토스트 알림 -->
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div id="toast-content" class="px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 backdrop-blur-xl border bg-indigo-600/90 border-indigo-400/50 text-white animate-slide-up">
            <i id="toast-icon" data-lucide="check-circle-2" class="w-4 h-4"></i>
            <span id="toast-message" class="text-sm font-bold tracking-tight"></span>
        </div>
    </div>

    <!-- 헤더 -->
    <header class="sticky top-0 z-40 w-full border-b backdrop-blur-xl transition-all duration-300 border-slate-800/50 bg-slate-950/70 dark:border-slate-800/50 dark:bg-slate-950/70 light:bg-white/80 light:border-slate-200">
        <div class="container mx-auto px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tighter text-white">Vibe Coding <span class="text-indigo-500 font-extrabold uppercase">Games</span></h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="theme-toggle" class="p-2.5 rounded-xl transition-all border border-transparent hover:border-slate-700/50 hover:bg-slate-800/50 dark:text-slate-400 light:text-slate-600">
                    <i id="theme-icon" data-lucide="sun" class="w-5 h-5"></i>
                </button>
                <div class="h-6 w-[1px] bg-slate-800 mx-2"></div>
                <button onclick="toggleModal('add-modal', true)" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-indigo-500/20 active:scale-95 uppercase tracking-tighter">
                    <i data-lucide="plus" class="w-4 h-4"></i> 추가하기
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="container mx-auto px-8 py-20">
        <!-- 소개 섹션 -->
        <section class="mb-24 text-center max-w-3xl mx-auto animate-slide-up">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-500 text-xs font-bold uppercase tracking-widest mb-8">
                <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                Official Collection
            </div>
            <h2 class="text-5xl md:text-7xl font-black mb-8 tracking-tighter leading-tight neon-text uppercase">VIBE CODING GAMES</h2>
            <p id="hero-subtitle" class="text-lg md:text-xl font-medium text-slate-400 max-w-xl mx-auto leading-relaxed">
                모든 게임들은 Gemini를 이용하여 만들었습니다.
            </p>
        </section>

        <!-- 비어있는 상태 -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 rounded-[3rem] border-2 border-dashed border-slate-800/50 bg-slate-900/10">
            <div class="w-20 h-20 flex items-center justify-center rounded-3xl bg-slate-800/50 text-slate-500 mb-6">
                <i data-lucide="layout-grid" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-bold mb-3 tracking-tight">아직 등록된 게임이 없습니다</h3>
            <p class="text-slate-500 mb-10">당신의 멋진 프로젝트를 목록에 추가해 보세요.</p>
            <button onclick="toggleModal('add-modal', true)" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold transition-all hover:bg-indigo-500 shadow-xl shadow-indigo-500/20 active:scale-95 uppercase tracking-tighter">
                프로젝트 등록하기
            </button>
        </div>

        <!-- 게임 그리드 -->
        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 게임 카드가 여기에 삽입됩니다 -->
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="mt-32 py-20 border-t border-slate-900/50 transition-colors">
        <div class="container mx-auto px-8 text-center">
            <div class="flex justify-center mb-8">
                <div class="w-12 h-12 bg-slate-900/50 border border-slate-800 rounded-2xl flex items-center justify-center">
                    <i data-lucide="zap" class="text-indigo-500 w-6 h-6"></i>
                </div>
            </div>
            <p class="font-bold mb-3 tracking-tight text-slate-300">VIBE CODING GAMES</p>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-600 font-bold">
                © 2026 Moon Seo-yun all rights reserved.
            </p>
        </div>
    </footer>

    <!-- 모달 -->
    <div id="add-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md transition-opacity" onclick="toggleModal('add-modal', false)"></div>
        <div class="relative w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden glass-card dark:bg-slate-900 light:bg-white border-white/10 p-8 modal-content animate-slide-up">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-2xl font-black tracking-tight">새 프로젝트 등록</h3>
                <button onclick="toggleModal('add-modal', false)" class="p-2 rounded-xl hover:bg-slate-800/50 transition-colors text-slate-400">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="add-game-form" class="space-y-8">
                <div class="space-y-3">
                    <label class="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-500">프로젝트 타이틀</label>
                    <input type="text" id="form-title" required placeholder="게임 이름을 입력하세요" class="w-full px-5 py-4 rounded-2xl border-2 outline-none transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 font-bold">
                </div>

                <div class="space-y-3">
                    <label class="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-500">플레이 링크 (Github/Vercel)</label>
                    <input type="url" id="form-url" required placeholder="https://..." class="w-full px-5 py-4 rounded-2xl border-2 outline-none transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 font-medium">
                </div>

                <div class="space-y-3">
                    <label class="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-500">프로젝트 요약 설명</label>
                    <textarea id="form-description" rows="3" placeholder="어떤 게임인가요?" class="w-full px-5 py-4 rounded-2xl border-2 outline-none transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 resize-none font-medium leading-relaxed"></textarea>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-indigo-500/30 active:scale-95 uppercase tracking-tighter mt-4">
                    포트폴리오에 저장
                </button>
            </form>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div id="delete-modal" class="fixed inset-0 z-[60] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" onclick="toggleModal('delete-modal', false)"></div>
        <div class="relative w-full max-w-sm rounded-[2.5rem] p-10 text-center glass-card dark:bg-slate-900 light:bg-white border-white/5">
            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <i data-lucide="trash-2" class="w-10 h-10"></i>
            </div>
            <h3 class="text-2xl font-bold mb-3 tracking-tight">프로젝트 삭제</h3>
            <p class="text-slate-500 mb-10 leading-relaxed text-sm">
                해당 프로젝트가 목록에서 영구적으로 제거됩니다.<br/>이 작업은 취소할 수 없습니다.
            </p>
            <div class="flex gap-4">
                <button onclick="toggleModal('delete-modal', false)" class="flex-1 py-4 rounded-2xl font-bold bg-slate-800 text-white hover:bg-slate-700 transition-colors">취소</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 rounded-2xl font-bold bg-red-500 text-white hover:bg-red-600 transition-all shadow-lg shadow-red-500/20 active:scale-95">삭제하기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 초기 게임 데이터 세팅 ---
        const INITIAL_GAMES = [
            {
                id: "vibe-rush-official",
                title: "Vibe Rush", 
                url: "https://gamedevmsy.github.io/VibeCoding_Game/VibeRush", 
                description: "10초라는 짧은 제한 시간 내에 무작위로 등장하는 미니게임 플레이",
                createdAt: new Date().toISOString(),
                type: "Micro-game"
            }
        ];

        let gamesList = [];
        let pendingDeleteId = null;
        let isDarkMode = true;

        const loadGames = () => {
            const saved = localStorage.getItem('vibe_minimal_portfolio');
            if (saved) {
                const savedGames = JSON.parse(saved);
                const combined = [...INITIAL_GAMES];
                savedGames.forEach(sg => {
                    if (!combined.some(cg => cg.id === sg.id)) combined.push(sg);
                });
                gamesList = combined;
            } else {
                gamesList = [...INITIAL_GAMES];
            }
            renderGames();
        };

        const saveToLocal = () => {
            localStorage.setItem('vibe_minimal_portfolio', JSON.stringify(gamesList));
            renderGames();
        };

        const showToast = (message, type = 'success') => {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        const toggleModal = (id, show) => {
            const modal = document.getElementById(id);
            if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
            else { modal.classList.add('hidden'); modal.classList.remove('flex'); }
        };

        document.getElementById('theme-toggle').onclick = () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark', isDarkMode);
            document.body.classList.toggle('light', !isDarkMode);
            document.getElementById('theme-icon').setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
            renderGames();
        };

        const renderGames = () => {
            const grid = document.getElementById('game-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';
            
            if (gamesList.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = `glass-card group relative p-10 flex flex-col h-full rounded-[2.5rem] animate-slide-up`;
                
                const titleColor = isDarkMode ? 'text-white' : 'text-slate-900';
                const descColor = isDarkMode ? 'text-slate-400' : 'text-slate-500';

                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-10">
                            <div class="w-14 h-14 bg-indigo-600/10 border border-indigo-500/20 rounded-2xl flex items-center justify-center text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-300">
                                <i data-lucide="gamepad-2" class="w-7 h-7"></i>
                            </div>
                            <button onclick="confirmDelete('${game.id}')" class="p-2 text-slate-600 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <h3 class="text-2xl font-black mb-4 tracking-tight group-hover:text-indigo-500 transition-colors ${titleColor}">${game.title}</h3>
                        <p class="text-sm leading-relaxed mb-10 line-clamp-2 ${descColor}">${game.description || '작성된 설명이 없습니다.'}</p>
                    </div>
                    <div class="mt-auto flex items-center gap-4">
                        <a href="${game.url}" target="_blank" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-2xl font-black text-xs text-center transition-all active:scale-95 uppercase tracking-tighter shadow-lg shadow-indigo-500/20">
                            Play
                        </a>
                        <a href="${game.url}" target="_blank" class="w-14 h-14 border border-slate-800 dark:border-slate-800 light:border-slate-200 rounded-2xl flex items-center justify-center hover:bg-slate-800/10 transition-all ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}">
                            <i data-lucide="external-link" class="w-5 h-5"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        };

        window.confirmDelete = (id) => { pendingDeleteId = id; toggleModal('delete-modal', true); };

        document.getElementById('confirm-delete-btn').onclick = () => {
            gamesList = gamesList.filter(g => g.id !== pendingDeleteId);
            saveToLocal();
            toggleModal('delete-modal', false);
            showToast("프로젝트가 성공적으로 삭제되었습니다.");
        };

        document.getElementById('add-game-form').onsubmit = (e) => {
            e.preventDefault();
            const newGame = {
                id: Date.now().toString(),
                title: document.getElementById('form-title').value,
                url: document.getElementById('form-url').value,
                description: document.getElementById('form-description').value,
                createdAt: new Date().toISOString()
            };
            gamesList.unshift(newGame);
            saveToLocal();
            toggleModal('add-modal', false);
            e.target.reset();
            showToast("새 프로젝트가 등록되었습니다!");
        };

        window.onload = () => {
            loadGames();
            lucide.createIcons();
        };
    </script>
</body>
</html>
