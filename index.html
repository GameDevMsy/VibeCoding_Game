<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Portfolio</title>
    <!-- 도구 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <!-- 여기서부터 작성하신 코드를 넣습니다. 단, script 타입을 babel로 설정해야 함 -->
    <script type="text/babel">
        // 아까 보여주신 코드를 여기에 붙여넣되, 
        // import 문들은 제거하고 React.useState 처럼 사용하거나 
        // 상단에 const { useState, useEffect } = React; 를 추가해야 합니다.
        
        const { useState, useEffect } = React;
        
        const App = () => {
            // ... (보여주신 코드 내용) ...
            return (
                <div className="bg-slate-950 text-white p-10">
                    <h1>성공! 화면이 나오나요?</h1>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
