<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE CODING GAMES - Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-font-smoothing: antialiased;
        }

        /* 유리 질감 카드 디자인 */
        .glass-card {
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 다크 모드 카드 스타일 */
        .dark .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .dark .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
            transform: translateY(-4px);
        }

        /* 라이트 모드 카드 스타일 */
        .light .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .light .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        .dark .neon-text {
            text-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .light ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="dark bg-slate-950 text-slate-100 min-h-screen selection:bg-indigo-500 selection:text-white">

    <!-- 토스트 알림 -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div id="toast-content" class="px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 backdrop-blur-xl border bg-indigo-600/90 border-indigo-400/50 text-white">
            <i id="toast-icon" data-lucide="info" class="w-4 h-4"></i>
            <span id="toast-message" class="text-sm font-bold tracking-tight"></span>
        </div>
    </div>

    <!-- 헤더 -->
    <header id="main-header" class="sticky top-0 z-40 w-full border-b backdrop-blur-xl transition-all duration-300 border-slate-800/50 bg-slate-950/70">
        <div class="container mx-auto px-6 md:px-12 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tighter hidden sm:block">Vibe Coding <span class="text-indigo-500 font-extrabold uppercase dark:text-indigo-400 light:text-indigo-600">Games</span></h1>
            </div>
            
            <div class="flex items-center gap-2 md:gap-3">
                <!-- 공유 버튼 (관리자용) -->
                <button id="share-link-btn" class="flex items-center gap-2 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter border transition-all dark:border-slate-800 dark:hover:bg-slate-800 border-slate-200 hover:bg-slate-100" title="방문자 전용 링크 복사">
                    <i data-lucide="share-2" class="w-3.5 h-3.5 text-indigo-500"></i>
                    <span class="hidden md:inline">공유하기</span>
                </button>

                <!-- 모드 전환 버튼 (비밀번호 보호) -->
                <button id="mode-toggle" class="flex items-center gap-2 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter border transition-all dark:border-slate-800 dark:hover:bg-slate-800 border-slate-200 hover:bg-slate-100">
                    <i id="mode-icon" data-lucide="eye" class="w-3.5 h-3.5 text-indigo-500"></i>
                    <span id="mode-text">방문자</span>
                </button>

                <div id="header-divider" class="h-6 w-[1px] bg-slate-800/50 dark:bg-slate-800 light:bg-slate-200 mx-1"></div>

                <button id="theme-toggle" class="p-2.5 rounded-xl transition-all border border-transparent hover:border-slate-700/50 hover:bg-slate-800/50 dark:text-slate-400 light:text-slate-600">
                    <i id="theme-icon" data-lucide="sun" class="w-5 h-5"></i>
                </button>

                <button id="header-add-btn" onclick="openAddModal()" class="hidden items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-indigo-500/20 active:scale-95 uppercase tracking-tighter">
                    <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden md:inline">추가하기</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="container mx-auto px-6 md:px-12 py-16 md:py-24">
        <section class="mb-24 text-center max-w-3xl mx-auto animate-slide-up">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-500 text-[10px] font-black uppercase tracking-[0.2em] mb-8">
                <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                Official Collection
            </div>
            <h2 id="main-title" class="text-5xl md:text-8xl font-black mb-8 tracking-tighter leading-[0.9] neon-text uppercase text-white transition-all duration-300">VIBE CODING GAMES</h2>
            <p id="hero-subtitle" class="text-lg md:text-xl font-medium text-slate-400 max-w-xl mx-auto leading-relaxed">
                모든 게임들은 Gemini를 이용하여 만들었습니다.
            </p>
        </section>

        <!-- 비어있는 상태 -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 rounded-[3rem] border-2 border-dashed border-slate-800/50 bg-slate-900/10 transition-colors">
            <div class="w-20 h-20 flex items-center justify-center rounded-3xl bg-slate-800/50 text-slate-500 mb-6">
                <i data-lucide="layout-grid" class="w-10 h-10"></i>
            </div>
            <h3 id="empty-title" class="text-2xl font-bold mb-3 tracking-tight">아직 등록된 게임이 없습니다</h3>
            <p class="text-slate-500 mb-10">목록에 새로운 프로젝트를 추가해 보세요.</p>
            <button id="empty-add-btn" onclick="openAddModal()" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold transition-all hover:bg-indigo-500 shadow-xl shadow-indigo-500/20 active:scale-95 uppercase tracking-tighter">
                프로젝트 등록하기
            </button>
        </div>

        <!-- 게임 그리드 -->
        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </main>

    <!-- 푸터 -->
    <footer id="main-footer" class="mt-32 py-20 border-t border-slate-900/50 transition-all duration-300 bg-slate-950">
        <div class="container mx-auto px-8 text-center">
            <div class="flex justify-center mb-8">
                <div class="w-12 h-12 bg-slate-900/50 border border-slate-800 rounded-2xl flex items-center justify-center">
                    <i data-lucide="zap" class="text-indigo-500 w-6 h-6"></i>
                </div>
            </div>
            <p id="footer-text" class="font-bold mb-3 tracking-tight text-slate-300 uppercase">VIBE CODING GAMES</p>
            <p id="copyright" class="text-[11px] uppercase tracking-[0.3em] text-slate-600 font-black text-white dark:text-slate-600 light:text-slate-400">
                © 2026 Moon Seo-yun all rights reserved.
            </p>
        </div>
    </footer>

    <!-- 모달: 비밀번호 확인 -->
    <div id="password-modal" class="fixed inset-0 z-[70] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-lg" onclick="toggleModal('password-modal', false)"></div>
        <div id="password-modal-box" class="relative w-full max-w-sm rounded-[2.5rem] p-10 text-center bg-slate-900 border border-white/10 animate-slide-up">
            <div class="w-16 h-16 bg-indigo-500/10 text-indigo-500 rounded-2xl flex items-center justify-center mx-auto mb-8">
                <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
            </div>
            <h3 class="text-2xl font-black mb-2 text-white dark:text-white light:text-slate-900">관리자 인증</h3>
            <p class="text-slate-500 mb-8 text-sm">편집 권한을 얻으려면 비밀번호를 입력하세요.</p>
            <input type="password" id="admin-password-input" placeholder="••••" class="w-full px-5 py-4 rounded-2xl border-2 outline-none text-center text-xl tracking-[0.5em] transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 mb-6 font-bold">
            <button id="password-confirm-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-2xl transition-all active:scale-95 uppercase tracking-tighter shadow-lg shadow-indigo-500/20">
                인증하기
            </button>
        </div>
    </div>

    <!-- 모달: 게임 추가/수정 -->
    <div id="add-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md transition-opacity" onclick="toggleModal('add-modal', false)"></div>
        <div id="modal-box" class="relative w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden p-10 animate-slide-up bg-slate-900 border border-white/10">
            <div class="flex justify-between items-center mb-12">
                <h3 id="modal-title" class="text-2xl font-black tracking-tight text-white transition-colors">새 프로젝트 등록</h3>
                <button onclick="toggleModal('add-modal', false)" class="p-2 rounded-xl hover:bg-slate-800/50 transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
                </button>
            </div>
            <form id="add-game-form" class="space-y-8">
                <input type="hidden" id="form-id">
                <div class="space-y-3">
                    <label class="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-500">Project Title</label>
                    <input type="text" id="form-title" required placeholder="게임 이름을 입력하세요" class="w-full px-5 py-4 rounded-2xl border-2 outline-none transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 font-bold dark:text-white light:text-slate-900 light:bg-white light:border-slate-200">
                </div>
                <div class="space-y-3">
                    <label class="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-500">Live URL</label>
                    <input type="url" id="form-url" required placeholder="https://..." class="w-full px-5 py-4 rounded-2xl border-2 outline-none transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 font-medium dark:text-white light:text-slate-900 light:bg-white light:border-slate-200">
                </div>
                <div class="space-y-3">
                    <label class="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-500">Summary</label>
                    <textarea id="form-description" rows="3" placeholder="어떤 게임인가요?" class="w-full px-5 py-4 rounded-2xl border-2 outline-none transition-all bg-transparent border-slate-800 text-white focus:border-indigo-500 resize-none font-medium leading-relaxed dark:text-white light:text-slate-900 light:bg-white light:border-slate-200"></textarea>
                </div>
                <button type="submit" id="form-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-indigo-500/30 active:scale-95 uppercase tracking-tighter mt-4">
                    포트폴리오에 저장
                </button>
            </form>
        </div>
    </div>

    <!-- 모달: 삭제 확인 -->
    <div id="delete-modal" class="fixed inset-0 z-[60] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" onclick="toggleModal('delete-modal', false)"></div>
        <div id="delete-modal-box" class="relative w-full max-w-sm rounded-[2.5rem] p-10 text-center bg-slate-900 border border-white/5 text-white">
            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <i data-lucide="trash-2" class="w-10 h-10"></i>
            </div>
            <h3 id="del-modal-title" class="text-2xl font-bold mb-3 tracking-tight text-white">프로젝트 삭제</h3>
            <p class="text-slate-500 mb-10 leading-relaxed text-sm text-slate-400">목록에서 영구적으로 제거됩니다.</p>
            <div class="flex gap-4">
                <button onclick="toggleModal('delete-modal', false)" class="flex-1 py-4 rounded-2xl font-bold bg-slate-800 text-white hover:bg-slate-700 transition-colors text-sm">취소</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 rounded-2xl font-bold bg-red-500 text-white hover:bg-red-600 transition-all text-sm">삭제하기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 핵심 설정 ---
        const ADMIN_PASSWORD = "9823"; // 사용자 요청 비밀번호

        const INITIAL_GAMES = [
            {
                id: "vibe-rush-fixed",
                title: "Vibe Rush", 
                url: "https://gamedevmsy.github.io/VibeCoding_Game/VibeRush", 
                description: "10초라는 짧은 제한 시간 내에 무작위로 등장하는 4가지 미니게임을 클리어하며 한계에 도전하는 게임",
                createdAt: new Date().toISOString()
            }
        ];

        let gamesList = [];
        let pendingDeleteId = null;
        let isDarkMode = true;
        let isOwnerMode = false; // 기본 방문자 모드
        let isForcedVisitor = false; // URL 파라미터 강제 방문자 여부

        const loadGames = () => {
            const saved = localStorage.getItem('vibe_portfolio_secure_v6');
            if (saved) {
                const savedGames = JSON.parse(saved);
                const combined = [...INITIAL_GAMES];
                savedGames.forEach(sg => {
                    if (!combined.some(cg => cg.id === sg.id)) combined.push(sg);
                });
                gamesList = combined;
            } else {
                gamesList = [...INITIAL_GAMES];
            }
            renderGames();
        };

        const saveToLocal = () => {
            localStorage.setItem('vibe_portfolio_secure_v6', JSON.stringify(gamesList));
            renderGames();
        };

        const showToast = (message, type = 'success') => {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            toastMessage.textContent = message;
            toastIcon.setAttribute('data-lucide', type === 'error' ? 'alert-circle' : 'check-circle-2');
            lucide.createIcons();
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        const toggleModal = (id, show) => {
            const modal = document.getElementById(id);
            if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
            else { modal.classList.add('hidden'); modal.classList.remove('flex'); }
        };

        // 방문자 전용 링크 공유 기능
        document.getElementById('share-link-btn').onclick = () => {
            const visitorUrl = window.location.origin + window.location.pathname + "?visitor=true";
            const dummy = document.createElement("input");
            document.body.appendChild(dummy);
            dummy.value = visitorUrl;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("방문자용 전용 공유 링크가 복사되었습니다!");
        };

        const updateModeUI = () => {
            const modeIcon = document.getElementById('mode-icon');
            const modeText = document.getElementById('mode-text');
            const modeToggleBtn = document.getElementById('mode-toggle');
            const headerAddBtn = document.getElementById('header-add-btn');
            const shareBtn = document.getElementById('share-link-btn');
            const emptyAddBtn = document.getElementById('empty-add-btn');

            // URL 파라미터가 ?visitor=true 인 경우 모드 전환 버튼을 완전히 숨김
            if (isForcedVisitor) {
                modeToggleBtn.style.display = "none";
                shareBtn.style.display = "none"; // 방문자는 공유 버튼도 안보이게 처리 가능
            }

            if (isOwnerMode) {
                modeIcon.setAttribute('data-lucide', 'lock');
                modeIcon.classList.remove('text-indigo-500');
                modeText.textContent = "관리자";
                headerAddBtn.classList.remove('hidden');
                headerAddBtn.classList.add('flex');
                if(emptyAddBtn) emptyAddBtn.classList.remove('hidden');
            } else {
                modeIcon.setAttribute('data-lucide', 'eye');
                modeIcon.classList.add('text-indigo-500');
                modeText.textContent = "방문자";
                headerAddBtn.classList.add('hidden');
                headerAddBtn.classList.remove('flex');
                if(emptyAddBtn) emptyAddBtn.classList.add('hidden');
            }
            lucide.createIcons();
        };

        document.getElementById('mode-toggle').onclick = () => {
            if (isOwnerMode) {
                isOwnerMode = false;
                updateModeUI();
                renderGames();
                showToast("방문자 모드로 전환되었습니다.");
            } else {
                document.getElementById('admin-password-input').value = "";
                toggleModal('password-modal', true);
            }
        };

        document.getElementById('password-confirm-btn').onclick = () => {
            if (document.getElementById('admin-password-input').value === ADMIN_PASSWORD) {
                isOwnerMode = true;
                toggleModal('password-modal', false);
                updateModeUI();
                renderGames();
                showToast("관리자 인증 성공!");
            } else {
                showToast("비밀번호가 틀렸습니다.", "error");
            }
        };

        // 전체 테마 토글 (색상 동기화 로직)
        document.getElementById('theme-toggle').onclick = () => {
            isDarkMode = !isDarkMode;
            const body = document.body;
            const header = document.getElementById('main-header');
            const footer = document.getElementById('main-footer');
            const modalBoxes = [
                document.getElementById('modal-box'),
                document.getElementById('delete-modal-box'),
                document.getElementById('password-modal-box')
            ];
            const title = document.getElementById('main-title');
            const subtitle = document.getElementById('hero-subtitle');
            const icon = document.getElementById('theme-icon');
            const copy = document.getElementById('copyright');

            if (isDarkMode) {
                body.className = "dark bg-slate-950 text-slate-100 min-h-screen";
                header.className = "sticky top-0 z-40 w-full border-b backdrop-blur-xl transition-colors duration-300 border-slate-800/50 bg-slate-950/70";
                footer.className = "mt-32 py-20 border-t border-slate-900/50 transition-all duration-300 bg-slate-950";
                modalBoxes.forEach(box => {
                    box.classList.add('bg-slate-900', 'border-white/10');
                    box.classList.remove('bg-white', 'border-slate-200');
                    const textElems = box.querySelectorAll('h3, p, label');
                    textElems.forEach(el => {
                        if(el.tagName === 'P') el.className = "text-slate-500 mb-8 text-sm";
                        else if(el.tagName === 'H3') el.className = "text-2xl font-black tracking-tight text-white";
                    });
                });
                title.className = "text-5xl md:text-8xl font-black mb-8 tracking-tighter leading-[0.9] neon-text uppercase text-white transition-all duration-300";
                subtitle.className = "text-lg md:text-xl font-medium text-slate-400 max-w-xl mx-auto leading-relaxed";
                icon.setAttribute('data-lucide', 'sun');
                copy.className = "text-[11px] uppercase tracking-[0.3em] text-slate-600 font-black";
            } else {
                body.className = "light bg-slate-50 text-slate-900 min-h-screen";
                header.className = "sticky top-0 z-40 w-full border-b backdrop-blur-xl transition-colors duration-300 border-slate-200 bg-white/80";
                footer.className = "mt-32 py-20 border-t border-slate-200 transition-all duration-300 bg-white";
                modalBoxes.forEach(box => {
                    box.classList.remove('bg-slate-900', 'border-white/10');
                    box.classList.add('bg-white', 'border-slate-200');
                    const textElems = box.querySelectorAll('h3, p, label');
                    textElems.forEach(el => {
                        if(el.tagName === 'P') el.className = "text-slate-500 mb-8 text-sm";
                        else if(el.tagName === 'H3') el.className = "text-2xl font-black tracking-tight text-slate-900";
                    });
                });
                title.className = "text-5xl md:text-8xl font-black mb-8 tracking-tighter leading-[0.9] uppercase text-slate-900 transition-all duration-300";
                subtitle.className = "text-lg md:text-xl font-medium text-slate-600 max-w-xl mx-auto leading-relaxed";
                icon.setAttribute('data-lucide', 'moon');
                copy.className = "text-[11px] uppercase tracking-[0.3em] text-slate-400 font-black";
            }
            lucide.createIcons();
            renderGames();
        };

        window.openAddModal = () => {
            document.getElementById('modal-title').textContent = "새 프로젝트 등록";
            document.getElementById('form-id').value = "";
            document.getElementById('form-title').value = "";
            document.getElementById('form-url').value = "";
            document.getElementById('form-description').value = "";
            document.getElementById('form-submit-btn').textContent = "포트폴리오에 저장";
            toggleModal('add-modal', true);
        };

        window.openEditModal = (id) => {
            const game = gamesList.find(g => g.id === id);
            if (!game) return;
            document.getElementById('modal-title').textContent = "프로젝트 수정";
            document.getElementById('form-id').value = game.id;
            document.getElementById('form-title').value = game.title;
            document.getElementById('form-url').value = game.url;
            document.getElementById('form-description').value = game.description;
            document.getElementById('form-submit-btn').textContent = "수정사항 저장";
            toggleModal('add-modal', true);
        };

        const renderGames = () => {
            const grid = document.getElementById('game-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';
            
            if (gamesList.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = `glass-card group relative p-10 flex flex-col h-full rounded-[2.5rem] animate-slide-up`;
                
                const titleColor = isDarkMode ? 'text-white' : 'text-slate-900';
                const descColor = isDarkMode ? 'text-slate-400' : 'text-slate-500';

                const adminButtons = isOwnerMode ? `
                    <div class="flex gap-2">
                        <button onclick="openEditModal('${game.id}')" class="p-2 text-slate-400 hover:text-indigo-500 transition-all" title="수정">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <button onclick="confirmDelete('${game.id}')" class="p-2 text-slate-400 hover:text-red-500 transition-all" title="삭제">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                ` : '';

                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-10 transition-all">
                            <div class="w-14 h-14 bg-indigo-600/10 border border-indigo-500/20 rounded-2xl flex items-center justify-center text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-500">
                                <i data-lucide="gamepad-2" class="w-7 h-7"></i>
                            </div>
                            ${adminButtons}
                        </div>
                        <h3 class="text-2xl font-black mb-4 tracking-tight group-hover:text-indigo-500 transition-colors ${titleColor}">${game.title}</h3>
                        <p class="text-sm leading-relaxed mb-10 line-clamp-2 ${descColor}">${game.description || '작성된 설명이 없습니다.'}</p>
                    </div>
                    <div class="mt-auto flex items-center gap-4">
                        <a href="${game.url}" target="_blank" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-2xl font-black text-xs text-center transition-all active:scale-95 uppercase tracking-tighter shadow-lg shadow-indigo-500/20">
                            Play
                        </a>
                        <a href="${game.url}" target="_blank" class="w-14 h-14 border rounded-2xl flex items-center justify-center hover:bg-slate-800/10 transition-all ${isDarkMode ? 'border-slate-800 text-slate-400' : 'border-slate-200 text-slate-500'}">
                            <i data-lucide="external-link" class="w-5 h-5"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        };

        window.confirmDelete = (id) => { pendingDeleteId = id; toggleModal('delete-modal', true); };

        document.getElementById('confirm-delete-btn').onclick = () => {
            gamesList = gamesList.filter(g => g.id !== pendingDeleteId);
            saveToLocal();
            toggleModal('delete-modal', false);
            showToast("프로젝트가 삭제되었습니다.");
        };

        document.getElementById('add-game-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const title = document.getElementById('form-title').value;
            const url = document.getElementById('form-url').value;
            const description = document.getElementById('form-description').value;

            if (id) {
                const idx = gamesList.findIndex(g => g.id === id);
                if (idx !== -1) {
                    gamesList[idx] = { ...gamesList[idx], title, url, description };
                    showToast("수정 완료");
                }
            } else {
                const newGame = {
                    id: Date.now().toString(),
                    title, url, description,
                    createdAt: new Date().toISOString()
                };
                gamesList.unshift(newGame);
                showToast("새 프로젝트 등록 완료");
            }
            saveToLocal();
            toggleModal('add-modal', false);
            e.target.reset();
        };

        // 초기화
        window.onload = () => {
            // URL 파라미터 체크
            const params = new URLSearchParams(window.location.search);
            if (params.get('visitor') === 'true') {
                isForcedVisitor = true;
                isOwnerMode = false;
            } else {
                isOwnerMode = false; // 기본은 여전히 방문자 모드로 시작
            }
            
            loadGames();
            updateModeUI();
            lucide.createIcons();
        };
    </script>
</body>
</html>
