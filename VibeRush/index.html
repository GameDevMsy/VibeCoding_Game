<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Rush : 10초 도파민 아케이드</title>
    <style>
        /* === 전역 설정 및 폰트 === */
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@700;900&display=swap');

        :root {
            --bg-color: #050505;
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --neon-green: #00ff66;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Orbitron', 'Black Han Sans', sans-serif;
            overflow: hidden; /* 스크롤 방지 */
            touch-action: none; /* 모바일 터치 제스처 방지 */
            user-select: none;
        }

        /* === 화면 쉐이크 이펙트 === */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        /* === UI 컨테이너 (화면별 전환용) === */
        #game-container {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(5, 5, 5, 0.9); z-index: 10; transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; z-index: -1; }

        /* === 타이틀 & 결과 화면 스타일 === */
        h1 {
            font-size: 4rem; margin-bottom: 10px; text-align: center;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink);
            letter-spacing: 2px;
        }
        .subtitle { font-size: 1.5rem; color: var(--neon-blue); margin-bottom: 30px; text-shadow: 0 0 5px var(--neon-blue); }
        .score-display { font-size: 3rem; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); margin-bottom: 20px; text-align: center; }

        button {
            padding: 12px 30px; font-size: 1.5rem; font-family: inherit;
            background: transparent; color: var(--neon-blue);
            border: 3px solid var(--neon-blue); border-radius: 10px;
            cursor: pointer; text-shadow: 0 0 5px var(--neon-blue);
            box-shadow: 0 0 15px inset var(--neon-blue), 0 0 15px var(--neon-blue);
            transition: all 0.2s ease-in-out; text-transform: uppercase; margin: 10px;
        }
        button:hover, button:active {
            background: var(--neon-blue); color: var(--bg-color);
            box-shadow: 0 0 30px inset var(--neon-blue), 0 0 30px var(--neon-blue);
            transform: scale(1.05);
        }

        /* === 인게임 UI === */
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 5; font-size: 1.8rem; pointer-events: none; }
        #stage-text { color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink); }
        #timer-text { color: var(--text-color); font-weight: bold; }
        .danger-time { color: red !important; animation: pulse 0.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

        /* === 화면 정중앙 메세지 === */
        #center-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; z-index: 20; pointer-events: none; opacity: 0; transition: all 0.2s; white-space: nowrap; }
        .msg-clear { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); transform: translate(-50%, -50%) scale(1.2) !important; opacity: 1 !important; }
        .msg-fail { color: red; text-shadow: 0 0 20px red; transform: translate(-50%, -50%) scale(1.2) !important; opacity: 1 !important; }
        .msg-perfect { color: #ffeb3b; text-shadow: 0 0 30px #ffeb3b; transform: translate(-50%, -50%) scale(1.5) !important; opacity: 1 !important; }
        .msg-great { color: #00f3ff; text-shadow: 0 0 20px #00f3ff; transform: translate(-50%, -50%) scale(1.3) !important; opacity: 1 !important; }

        /* === 타이틀 전용 배경 및 꾸미기 === */
        .title-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 6px 100%; z-index: -1; pointer-events: none; }
        .game-info { background: rgba(0, 243, 255, 0.05); border: 1px solid var(--neon-blue); padding: 20px 40px; border-radius: 10px; margin-bottom: 30px; text-align: center; box-shadow: 0 0 15px rgba(0, 243, 255, 0.1); backdrop-filter: blur(5px); }
        .game-info p { color: var(--neon-pink); font-size: 1.5rem; margin: 0 0 15px 0; text-shadow: 0 0 8px var(--neon-pink); }
        .how-to { list-style: none; padding: 0; margin: 0; color: #ddd; font-family: 'Black Han Sans', sans-serif; font-size: 1.2rem; line-height: 1.8; letter-spacing: 1px; }
        .how-to strong { color: #fff; text-shadow: 0 0 5px #fff; }

        @keyframes btnPulse { 0% { box-shadow: 0 0 15px inset var(--neon-blue), 0 0 15px var(--neon-blue); } 50% { box-shadow: 0 0 25px inset var(--neon-blue), 0 0 30px var(--neon-blue); transform: scale(1.02); } 100% { box-shadow: 0 0 15px inset var(--neon-blue), 0 0 15px var(--neon-blue); } }
        .pulse-btn { animation: btnPulse 2s infinite; font-size: 2.2rem; padding: 15px 50px; }

        /* === 피버 모드 === */
        @keyframes feverBg { 0% { filter: hue-rotate(0deg); box-shadow: inset 0 0 50px rgba(255,0,0,0.5); } 50% { filter: hue-rotate(180deg); box-shadow: inset 0 0 100px rgba(255,0,255,0.5); } 100% { filter: hue-rotate(360deg); box-shadow: inset 0 0 50px rgba(255,0,0,0.5); } }
        .fever-active { animation: feverBg 0.3s infinite; }
        #best-stage-text { color: #ffea00; font-size: 1rem; text-shadow: 0 0 5px #ffea00; margin-top: 5px; letter-spacing: 1px; }
        .fever-alert { color: #ff003c !important; font-weight: 900; animation: shake 0.2s infinite; text-shadow: 0 0 20px #ff003c !important; transform: translate(-50%, -50%) scale(1.5) !important; opacity: 1 !important; }

        /* === AI 분석 & 랭킹 UI === */
        .ai-btn { background: rgba(255, 0, 127, 0.1) !important; border-color: var(--neon-pink) !important; color: var(--neon-pink) !important; box-shadow: 0 0 10px inset var(--neon-pink), 0 0 10px var(--neon-pink) !important; font-size: 1.1rem; padding: 10px 20px; }
        .ai-btn:hover { background: var(--neon-pink) !important; color: var(--bg-color) !important; box-shadow: 0 0 20px inset var(--neon-pink), 0 0 20px var(--neon-pink) !important; }
        #ai-result { margin-top: 15px; color: var(--neon-blue); font-size: 1.1rem; max-width: 80%; text-align: center; line-height: 1.6; text-shadow: 0 0 5px var(--neon-blue); min-height: 3.5rem; word-break: keep-all; }
        
        .btn-rank { border-color: #ffea00 !important; color: #ffea00 !important; box-shadow: 0 0 10px inset #ffea00, 0 0 10px #ffea00 !important; font-size: 1.1rem; }
        .btn-rank:hover { background: #ffea00 !important; color: #000 !important; box-shadow: 0 0 20px inset #ffea00, 0 0 20px #ffea00 !important; }

        .submit-box { display: flex; flex-direction: column; align-items: center; margin-top: 10px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .submit-box input { background: transparent; border: 2px solid var(--neon-green); color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 10px; outline: none; text-shadow: 0 0 5px var(--neon-green); box-shadow: 0 0 10px inset rgba(0,255,102,0.2); }
        .submit-box button { font-size: 1rem; padding: 8px 20px; margin: 0; border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px inset var(--neon-green), 0 0 10px var(--neon-green); }
        .submit-box button:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px inset var(--neon-green), 0 0 20px var(--neon-green); }

        /* === 리더보드 모달 === */
        #leaderboard-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: rgba(10, 10, 15, 0.95); border: 2px solid #ffea00; border-radius: 15px; padding: 20px; z-index: 100; box-shadow: 0 0 30px rgba(255, 234, 0, 0.3); display: flex; flex-direction: column; align-items: center; }
        #leaderboard-modal h2 { color: #ffea00; text-shadow: 0 0 10px #ffea00; margin-top: 0; font-size: 2rem; }
        .rank-list { width: 100%; list-style: none; padding: 0; margin: 0 0 20px 0; max-height: 300px; overflow-y: auto; }
        .rank-list li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 1.2rem; }
        .rank-list li .rank-num { color: #888; width: 30px; }
        .rank-list li .rank-name { color: #fff; flex-grow: 1; text-align: left; }
        .rank-list li .rank-score { color: var(--neon-green); font-weight: bold; text-shadow: 0 0 5px var(--neon-green); }
        .rank-list li:nth-child(1) { background: rgba(255, 215, 0, 0.1); border-radius: 5px; border-bottom: none; }
        .rank-list li:nth-child(1) .rank-num { color: gold; text-shadow: 0 0 5px gold; }
        .rank-list li:nth-child(1) .rank-name { color: gold; }
        .rank-list li:nth-child(2) .rank-num { color: silver; }
        .rank-list li:nth-child(3) .rank-num { color: #cd7f32; }
        
        #btn-close-modal { font-size: 1rem; padding: 8px 30px; border-color: #888; color: #888; box-shadow: none; }
        #btn-close-modal:hover { background: #333; color: #fff; }

        /* === 오디오 토글 버튼 === */
        #audio-toggle { position: absolute; top: 15px; right: 15px; z-index: 50; background: transparent; border: none; font-size: 2rem; cursor: pointer; color: #fff; text-shadow: 0 0 10px var(--neon-blue); padding: 5px; margin: 0; box-shadow: none; }
        #audio-toggle:hover { transform: scale(1.1); background: transparent; color: var(--neon-blue); box-shadow: none; }

        .footer { position: absolute; bottom: 20px; color: #555; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2px; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

    </style>
</head>
<body>

<div id="game-container">
    
    <button id="audio-toggle">🔊</button>

    <!-- 타이틀 화면 -->
    <div id="screen-title" class="screen">
        <div class="title-bg"></div>
        <h1>VIBE RUSH</h1>
        <div class="subtitle">10 SECONDS TO SURVIVE</div>
        
        <div class="game-info">
            <p>⚡ 4 RANDOM MICRO-GAMES ⚡</p>
            <ul class="how-to">
                <li>👆 <strong>TAP / CLICK</strong> : 타이밍 액션 & 타겟 파괴</li>
                <li>🖱️ <strong>MOVE</strong> : 박스 균형 유지 & 안전지대 대피</li>
            </ul>
        </div>

        <button id="btn-start" class="pulse-btn">START RUSH</button>
        <button id="btn-show-rank" class="btn-rank">🏆 LEADERBOARD</button>
        
        <div class="footer">© 2026 VIBE JAM CHALLENGE</div>
    </div>

    <!-- 게임 오버/결과 화면 -->
    <div id="screen-result" class="screen hidden">
        <h1 style="color: red; text-shadow: 0 0 20px red;">GAME OVER</h1>
        <div class="subtitle">YOUR RECORD</div>
        <div id="final-score" class="score-display">STAGE 1</div>
        
        <!-- 점수 등록 UI -->
        <div id="score-submit-area" class="submit-box hidden">
            <div style="margin-bottom: 5px; color:#ffea00;">NEW RECORD! REGISTER SCORE</div>
            <input type="text" id="player-name" maxlength="10" placeholder="ENTER NAME">
            <button id="btn-submit-score">SUBMIT TO GLOBAL</button>
        </div>

        <div class="btn-group">
            <button id="btn-retry">RETRY</button>
            <button id="btn-ai-analysis" class="ai-btn">✨ AI 플레이 분석 ✨</button>
        </div>
        <div id="ai-result"></div>
    </div>

    <!-- 리더보드 모달 -->
    <div id="leaderboard-modal" class="hidden">
        <h2>TOP 10 HACKERS</h2>
        <ul id="rank-list" class="rank-list">
            <li style="justify-content: center; color: #888;">LOADING...</li>
        </ul>
        <button id="btn-close-modal">CLOSE</button>
    </div>

    <!-- 인게임 HUD -->
    <div id="hud" class="hidden">
        <div>
            <div id="stage-text">STAGE: 1</div>
            <div id="best-stage-text">BEST: 1</div>
        </div>
        <div id="mission-text" style="color: var(--neon-blue); font-size: 1.5rem; text-align: center; position: absolute; left: 50%; transform: translateX(-50%); text-shadow: 0 0 10px var(--neon-blue);">미션 텍스트</div>
        <div id="timer-text">10.00</div>
    </div>

    <!-- 인게임 메시지 -->
    <div id="center-msg"></div>

    <!-- 게임 렌더링 캔버스 -->
    <canvas id="gameCanvas"></canvas>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /**
     * Vibe Rush : 코어 시스템, 사운드, 파이어베이스 연동 모듈
     */
    
    // --- 시스템 변수 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    
    // UI 요소
    const screenTitle = document.getElementById('screen-title');
    const screenResult = document.getElementById('screen-result');
    const hud = document.getElementById('hud');
    const stageText = document.getElementById('stage-text');
    const timerText = document.getElementById('timer-text');
    const missionText = document.getElementById('mission-text');
    const centerMsg = document.getElementById('center-msg');
    
    const submitArea = document.getElementById('score-submit-area');
    const rankModal = document.getElementById('leaderboard-modal');
    const rankList = document.getElementById('rank-list');
    
    // 상태 변수
    let gameState = 'TITLE'; // TITLE, PLAYING, STOPPED, GAMEOVER
    let stage = 1;
    let timeLeft = 10.00;
    let lastTime = 0;
    let animationId;
    let baseSpeed = 1.0;
    
    let bestStage = parseInt(localStorage.getItem('vibeRushBest') || '1');
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentGameKey = '';

    // === Gemini API 설정 ===
    const apiKey = ""; 
    const gameNames = { slider: "슬라이더 락", balance: "펜듈럼 밸런스", grid: "데스 그리드", sniper: "네온 스나이퍼" };

    // === Web Audio API (사운드 엔진) ===
    const SoundSys = {
        ctx: null,
        enabled: true,
        init() {
            if (!this.ctx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
            }
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        toggle() {
            this.enabled = !this.enabled;
            document.getElementById('audio-toggle').textContent = this.enabled ? '🔊' : '🔇';
        },
        play(freq, type, dur, vol=0.1) {
            if (!this.enabled || !this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + dur);
        },
        hit() { this.play(800, 'square', 0.05, 0.05); }, // 경쾌한 타격음
        clear() { 
            this.play(523.25, 'sine', 0.1, 0.1); // C5
            setTimeout(()=>this.play(659.25, 'sine', 0.1, 0.1), 100); // E5
            setTimeout(()=>this.play(783.99, 'sine', 0.2, 0.1), 200); // G5
        },
        fail() { this.play(150, 'sawtooth', 0.4, 0.15); }, // 묵직한 실패음
        fever() { 
            this.play(800, 'square', 0.2, 0.1); 
            setTimeout(()=>this.play(1200, 'square', 0.2, 0.1), 100); 
        }
    };

    // === Firebase 연동 (글로벌 리더보드) ===
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'vibe-rush-default';
    const fbConfigText = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
    let db = null, auth = null, currentUser = null;

    if (fbConfigText) {
        try {
            const firebaseConfig = JSON.parse(fbConfigText);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            onAuthStateChanged(auth, (user) => { currentUser = user; });
        } catch(e) { console.error("Firebase init failed", e); }
    }

    async function loadLeaderboard() {
        if (!db || !currentUser) {
            rankList.innerHTML = '<li style="justify-content:center;color:#ff003c;">DB 연결 실패</li>';
            return;
        }
        rankList.innerHTML = '<li style="justify-content:center;color:#888;">LOADING DATA...</li>';
        try {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            const snapshot = await getDocs(colRef);
            let records = [];
            snapshot.forEach(doc => records.push(doc.data()));
            
            // 점수 내림차순 정렬 후 Top 10 추출
            records.sort((a, b) => b.score - a.score);
            const top10 = records.slice(0, 10);
            
            if (top10.length === 0) {
                rankList.innerHTML = '<li style="justify-content:center;color:#888;">아직 기록이 없습니다. 첫 번째 해커가 되세요!</li>';
                return;
            }

            rankList.innerHTML = '';
            top10.forEach((record, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="rank-num">${idx+1}</span><span class="rank-name">${record.name}</span><span class="rank-score">STAGE ${record.score}</span>`;
                rankList.appendChild(li);
            });
        } catch (e) {
            rankList.innerHTML = '<li style="justify-content:center;color:#ff003c;">데이터를 불러오지 못했습니다.</li>';
            console.error(e);
        }
    }

    async function submitScore() {
        const nameInput = document.getElementById('player-name').value.trim() || 'UNKNOWN';
        if (!db || !currentUser) { alert("서버에 연결되지 않았습니다."); return; }
        
        const btn = document.getElementById('btn-submit-score');
        btn.textContent = "SAVING...";
        btn.disabled = true;

        try {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            await addDoc(colRef, {
                name: nameInput,
                score: stage,
                userId: currentUser.uid,
                timestamp: serverTimestamp()
            });
            submitArea.innerHTML = '<div style="color:#00ff66; font-size:1.5rem; text-shadow:0 0 10px #00ff66;">SAVED TO GLOBAL RANK!</div>';
        } catch (e) {
            btn.textContent = "FAILED";
            console.error(e);
        }
    }


    // --- 캔버스 리사이징 ---
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- 유틸리티 함수 ---
    function triggerCameraShake() {
        container.classList.remove('shake-active'); void container.offsetWidth;
        container.classList.add('shake-active');
        setTimeout(() => container.classList.remove('shake-active'), 300);
    }

    function showCenterMessage(text, type) {
        centerMsg.textContent = text;
        if (type === 'clear') centerMsg.className = 'msg-clear';
        else if (type === 'fail') centerMsg.className = 'msg-fail';
        else if (type === 'perfect') centerMsg.className = 'msg-perfect';
        else if (type === 'great') centerMsg.className = 'msg-great';
        else if (type === 'fever') centerMsg.className = 'fever-alert';
        setTimeout(() => centerMsg.className = '', 800);
    }

    function gameClear() {
        if (gameState !== 'PLAYING') return;
        gameState = 'STOPPED';
        triggerCameraShake();
        SoundSys.clear();
        
        let timeTaken = (container.classList.contains('fever-active') ? 5.00 : 10.00) - timeLeft;
        let evalText = "GOOD"; let evalType = "clear";
        if (timeTaken <= 3.0) { evalText = "PERFECT!!"; evalType = "perfect"; }
        else if (timeTaken <= 6.0) { evalText = "GREAT!"; evalType = "great"; }
        
        showCenterMessage(evalText, evalType);
        
        setTimeout(() => {
            stage++;
            if (stage > bestStage) {
                bestStage = stage;
                localStorage.setItem('vibeRushBest', bestStage);
                document.getElementById('best-stage-text').textContent = `BEST: ${bestStage}`;
            }
            startStage();
        }, 800);
    }

    function gameOver() {
        if (gameState !== 'PLAYING') return;
        gameState = 'GAMEOVER';
        container.classList.remove('fever-active'); 
        triggerCameraShake();
        SoundSys.fail();
        showCenterMessage("FAIL!", "fail");
        
        setTimeout(() => {
            document.getElementById('final-score').innerHTML = `STAGE ${stage}<br><span style="font-size:1.5rem; color:#fff;">BEST: ${bestStage}</span>`;
            
            // 점수 등록 창 로직 (2스테이지 이상 도달 시 기회 부여)
            if (stage > 1 && db) {
                submitArea.classList.remove('hidden');
                document.getElementById('btn-submit-score').textContent = "SUBMIT TO GLOBAL";
                document.getElementById('btn-submit-score').disabled = false;
            } else {
                submitArea.classList.add('hidden');
            }

            document.getElementById('ai-result').textContent = ""; 
            document.getElementById('btn-ai-analysis').style.display = 'block'; 
            
            screenResult.classList.remove('hidden');
            hud.classList.add('hidden');
        }, 1000);
    }

    // ==========================================
    // 🎮 미니게임 로직 정의 (4종)
    // ==========================================
    const MiniGames = {
        slider: {
            instruction: "녹색 존에서 클릭해 멈춰!", data: {},
            init: function(w, h, speed) {
                this.data.w = 15; this.data.h = h * 0.4; this.data.speed = (w * 0.01) * speed;
                this.data.dir = Math.random() > 0.5 ? 1 : -1;
                this.data.x = this.data.dir === 1 ? 0 : w - this.data.w;
                this.data.tw = Math.max(30, 150 - (stage * 8)); this.data.tx = (w / 2) - (this.data.tw / 2);
            },
            update: function(dt, w, h) {
                this.data.x += this.data.speed * this.data.dir;
                if (this.data.x <= 0) { this.data.x = 0; this.data.dir = 1; }
                else if (this.data.x + this.data.w >= w) { this.data.x = w - this.data.w; this.data.dir = -1; }
            },
            draw: function(ctx, w, h) {
                const cy = h / 2;
                ctx.fillStyle = 'rgba(0, 255, 102, 0.3)'; ctx.fillRect(this.data.tx, cy - this.data.h/2, this.data.tw, this.data.h);
                ctx.strokeStyle = '#00ff66'; ctx.strokeRect(this.data.tx, cy - this.data.h/2, this.data.tw, this.data.h);
                ctx.fillStyle = '#ff007f'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff007f';
                ctx.fillRect(this.data.x, cy - this.data.h/2, this.data.w, this.data.h); ctx.shadowBlur = 0;
            },
            onInput: function(type) {
                if (type !== 'down') return;
                const cx = this.data.x + (this.data.w / 2);
                if (cx >= this.data.tx && cx <= this.data.tx + this.data.tw) gameClear(); else gameOver();
            },
            onTimeOut: function() { gameOver(); }
        },
        balance: {
            instruction: "10초 동안 박스를 떨어뜨리지 마!", data: {},
            init: function(w, h, speed) {
                this.data.a = 0; 
                this.data.bx = 0; 
                // 초기 가속도를 주어 가만히 있으면 무조건 떨어지도록 강제
                this.data.bvx = (Math.random() > 0.5 ? 4 : -4) * (speed * 0.5);
                this.data.pw = Math.min(w * 0.8, 400); 
                this.data.g = 1.0 * Math.min(speed, 2.0); // 중력 스케일링
                this.data.friction = 0.92; // 마찰력: 얼음판처럼 미끄러지지 않게 제어력 부여
            },
            update: function(dt, w, h) {
                let ta = ((mouseX / w) - 0.5) * (Math.PI / 2.5);
                this.data.a += (ta - this.data.a) * 0.15; // 널빤지 회전 속도 약간 증가
                
                // 경사에 의한 중력 가속도 추가
                this.data.bvx += Math.sin(this.data.a) * this.data.g;
                
                // 가만히 있어도 미세하게 흔들리도록 랜덤 외력(바람) 추가
                this.data.bvx += (Math.random() - 0.5) * 0.5;
                
                // 마찰력 적용
                this.data.bvx *= this.data.friction; 
                this.data.bx += this.data.bvx;
                
                // 판정: 널빤지 가장자리에 10px 정도의 여유 버퍼를 주어 억울한 죽음 방지
                if (Math.abs(this.data.bx) > (this.data.pw / 2) + 10) gameOver();
            },
            draw: function(ctx, w, h) {
                ctx.save(); ctx.translate(w/2, h/2 + 100); ctx.rotate(this.data.a);
                ctx.fillStyle = '#00f3ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00f3ff';
                ctx.fillRect(-this.data.pw/2, -5, this.data.pw, 10);
                ctx.fillStyle = '#ff007f'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff007f';
                ctx.fillRect(this.data.bx - 20, -45, 40, 40);
                ctx.restore();
            },
            onInput: function(type) {}, onTimeOut: function() { gameClear(); }
        },
        grid: {
            instruction: "연속 폭발을 3번 피해라!", data: {},
            init: function(w, h, speed) {
                this.data.s = Math.min(w, h) * 0.6; this.data.cs = this.data.s / 3;
                this.data.ox = w/2 - this.data.s/2; this.data.oy = h/2 - this.data.s/2;
                this.data.p = {r: 1, c: 1}; 
                
                this.data.waves = 0;
                this.data.maxWaves = 3;
                this.data.state = 'WARNING'; // WARNING or EXPLODE
                this.data.timer = 0;
                this.data.warnTime = Math.max(0.6, 2.0 - (stage * 0.15)); // 스테이지 오를수록 빨리 터짐
                
                this.generateDangers = () => {
                    this.data.d = [];
                    let dc = Math.min(7, 3 + Math.floor(stage/2)); // 난이도에 따라 위험 칸 증가
                    while(this.data.d.length < dc) {
                        let r = Math.floor(Math.random()*3); let c = Math.floor(Math.random()*3);
                        if (!this.data.d.find(x => x.r===r && x.c===c)) this.data.d.push({r,c});
                    }
                };
                this.generateDangers();
            },
            update: function(dt, w, h) {
                this.data.timer += dt / 1000;
                
                if (this.data.state === 'WARNING') {
                    if (this.data.timer >= this.data.warnTime) {
                        // 폭발 판정
                        triggerCameraShake();
                        SoundSys.play(100, 'sawtooth', 0.2, 0.15); // 폭발 효과음
                        
                        let isDead = this.data.d.find(d => d.r === this.data.p.r && d.c === this.data.p.c);
                        if (isDead) {
                            gameOver();
                        } else {
                            this.data.state = 'EXPLODE';
                            this.data.timer = 0;
                        }
                    }
                } else if (this.data.state === 'EXPLODE') {
                    if (this.data.timer >= 0.2) { // 0.2초간 폭발 이펙트 유지 후 다음 웨이브
                        this.data.waves++;
                        if (this.data.waves >= this.data.maxWaves) {
                            gameClear(); // 3번 피하면 성공
                        } else {
                            this.data.state = 'WARNING';
                            this.data.timer = 0;
                            this.generateDangers(); // 새로운 위험 구역 생성
                        }
                    }
                }
            },
            draw: function(ctx, w, h) {
                // 상단에 남은 웨이브 표시
                ctx.fillStyle = '#fff'; ctx.font = "20px 'Orbitron'"; ctx.textAlign = "center";
                ctx.fillText(`WAVES: ${this.data.waves}/${this.data.maxWaves}`, w/2, this.data.oy - 20);
                
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        let x = this.data.ox + c*this.data.cs; let y = this.data.oy + r*this.data.cs;
                        let isD = this.data.d.find(d => d.r===r && d.c===c);
                        
                        // 칸 외곽선
                        ctx.strokeStyle = '#333'; ctx.strokeRect(x, y, this.data.cs, this.data.cs);
                        
                        if (isD) {
                            if (this.data.state === 'WARNING') {
                                ctx.fillStyle = (Math.floor(this.data.timer * 10) % 2 === 0) ? 'rgba(255,0,0,0.5)' : 'rgba(255,0,0,0.1)';
                                ctx.fillRect(x+5, y+5, this.data.cs-10, this.data.cs-10);
                            } else if (this.data.state === 'EXPLODE') {
                                ctx.fillStyle = '#ff003c'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff003c';
                                ctx.fillRect(x+2, y+2, this.data.cs-4, this.data.cs-4); ctx.shadowBlur = 0;
                            }
                        }
                        
                        if (this.data.p.r === r && this.data.p.c === c) {
                            ctx.fillStyle = '#00ff66'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ff66';
                            ctx.beginPath(); ctx.arc(x + this.data.cs/2, y + this.data.cs/2, this.data.cs*0.3, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                        }
                    }
                }
            },
            onInput: function(type, x, y) {
                if (type !== 'down') return;
                let c = Math.floor((x - this.data.ox) / this.data.cs); let r = Math.floor((y - this.data.oy) / this.data.cs);
                if (r>=0 && r<3 && c>=0 && c<3) { this.data.p = {r, c}; SoundSys.hit(); }
            },
            onTimeOut: function() {
                // 시간 다 될 때까지 3번 못 피했으면 탈락
                gameOver();
            }
        },
        sniper: {
            instruction: "빨간 폭탄을 피해 노란 원을 모두 파괴해!", data: {},
            init: function(w, h, speed) {
                this.data.ents = []; let v = 3 * speed;
                for(let i=0; i<3; i++) this.data.ents.push({ t: 'target', x: w/2, y: h/2, r: 25, vx: (Math.random()-0.5)*v*2, vy: (Math.random()-0.5)*v*2 });
                let bc = Math.min(5, 1 + Math.floor(stage/3));
                for(let i=0; i<bc; i++) this.data.ents.push({ t: 'bomb', x: w/2, y: h/2, r: 20, vx: (Math.random()-0.5)*v*2, vy: (Math.random()-0.5)*v*2 });
            },
            update: function(dt, w, h) {
                this.data.ents.forEach(e => {
                    e.x += e.vx; e.y += e.vy;
                    if(e.x < e.r || e.x > w-e.r) e.vx *= -1;
                    if(e.y < e.r || e.y > h-e.r) e.vy *= -1;
                });
            },
            draw: function(ctx, w, h) {
                this.data.ents.forEach(e => {
                    ctx.beginPath();
                    if (e.t === 'target') {
                        ctx.fillStyle = '#ffea00'; ctx.shadowColor = '#ffea00'; ctx.shadowBlur = 15; ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
                    } else {
                        ctx.fillStyle = '#ff003c'; ctx.shadowColor = '#ff003c'; ctx.shadowBlur = 15;
                        ctx.moveTo(e.x, e.y - e.r); ctx.lineTo(e.x + e.r, e.y + e.r); ctx.lineTo(e.x - e.r, e.y + e.r);
                    }
                    ctx.fill(); ctx.shadowBlur = 0;
                });
            },
            onInput: function(type, x, y) {
                if (type !== 'down') return;
                for (let i = this.data.ents.length - 1; i >= 0; i--) {
                    let e = this.data.ents[i]; let dist = Math.hypot(e.x - x, e.y - y);
                    if (dist < e.r * 1.5) {
                        triggerCameraShake();
                        if (e.t === 'bomb') { gameOver(); return; } 
                        else { this.data.ents.splice(i, 1); SoundSys.hit(); }
                    }
                }
                if (!this.data.ents.find(e => e.t === 'target')) gameClear();
            },
            onTimeOut: function() { gameOver(); }
        }
    };

    // ==========================================
    // 코어 게임 루프 관리
    // ==========================================
    function startGame() {
        SoundSys.init(); // 사용자 인터랙션 발생 시 오디오 컨텍스트 활성화
        stage = 1;
        screenTitle.classList.add('hidden');
        screenResult.classList.add('hidden');
        hud.classList.remove('hidden');
        startStage();
    }

    function startStage() {
        gameState = 'PLAYING';
        let isFever = (stage > 1 && stage % 5 === 0);
        
        if (isFever) {
            container.classList.add('fever-active');
            timeLeft = 5.00; baseSpeed = 1.0 + ((stage - 1) * 0.2) + 1.0;
            showCenterMessage("FEVER MODE!!", "fever");
            SoundSys.fever();
            stageText.innerHTML = `STAGE: ${stage} <span style="color:red; text-shadow:0 0 10px red;">🔥</span>`;
        } else {
            container.classList.remove('fever-active');
            timeLeft = 10.00; baseSpeed = 1.0 + ((stage - 1) * 0.15);
            stageText.textContent = `STAGE: ${stage}`;
        }
        
        timerText.classList.remove('danger-time');
        document.getElementById('best-stage-text').textContent = `BEST: ${bestStage}`;
        
        const keys = Object.keys(MiniGames);
        currentGameKey = keys[Math.floor(Math.random() * keys.length)];
        const game = MiniGames[currentGameKey];
        
        missionText.textContent = game.instruction;
        game.init(canvas.width, canvas.height, baseSpeed);

        lastTime = performance.now();
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop(lastTime);
    }

    function gameLoop(timestamp) {
        if (gameState !== 'PLAYING') return;
        const deltaTime = timestamp - lastTime; lastTime = timestamp;
        update(deltaTime); draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function update(deltaTime) {
        timeLeft -= deltaTime / 1000;
        if (timeLeft <= 0) { timeLeft = 0; MiniGames[currentGameKey].onTimeOut(); }
        timerText.textContent = timeLeft.toFixed(2);
        if (timeLeft <= 3.0 && !timerText.classList.contains('danger-time')) timerText.classList.add('danger-time');
        MiniGames[currentGameKey].update(deltaTime, canvas.width, canvas.height);
    }

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        MiniGames[currentGameKey].draw(ctx, canvas.width, canvas.height);
    }

    // --- 이벤트 리스너 바인딩 ---
    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-retry').addEventListener('click', startGame);
    document.getElementById('audio-toggle').addEventListener('click', () => SoundSys.toggle());
    
    // 리더보드 모달 조작
    document.getElementById('btn-show-rank').addEventListener('click', () => {
        rankModal.classList.remove('hidden');
        loadLeaderboard();
    });
    document.getElementById('btn-close-modal').addEventListener('click', () => {
        rankModal.classList.add('hidden');
    });

    // 점수 등록 버튼
    document.getElementById('btn-submit-score').addEventListener('click', submitScore);

    // AI 플레이 분석
    document.getElementById('btn-ai-analysis').addEventListener('click', async () => {
        const btn = document.getElementById('btn-ai-analysis');
        const resultDiv = document.getElementById('ai-result');
        btn.style.display = 'none';
        resultDiv.innerHTML = '<span class="loading-text">네트워크 접속 중... 해커 AI가 당신의 플레이를 분석합니다.</span>';
        
        const deadName = gameNames[currentGameKey];
        const prompt = `플레이어가 사이버펑크 게임 'Vibe Rush'에서 역대 최고 ${bestStage}스테이지 달성자인데, 이번 판은 ${stage}스테이지 '${deadName}' 미니게임에서 죽었어. 이 플레이어의 피지컬을 평가하는 시니컬하고 유쾌한 피드백을 작성해. 사이버펑크 해커처럼 반말로 2~3문장 이내로 짧게.`;
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        let resultText = "시스템 에러. 방화벽에 막혀 분석 데이터를 가져오지 못했다, 인간.";
        
        for (let i = 0; i < 5; i++) {
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                if (res.ok) { const data = await res.json(); resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "데이터 파싱 실패."; break; }
            } catch (error) {}
            if (i < 4) await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
        }
        
        resultDiv.innerHTML = '';
        let cIdx = 0;
        const tInt = setInterval(() => { resultDiv.textContent += resultText[cIdx++]; if (cIdx >= resultText.length) clearInterval(tInt); }, 40);
    });

    // 입력 처리
    function handleInput(type, e) {
        if (gameState !== 'PLAYING') return;
        let cx = e.clientX, cy = e.clientY;
        if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        mouseX = cx; mouseY = cy;
        MiniGames[currentGameKey].onInput(type, mouseX, mouseY);
    }
    window.addEventListener('mousedown', (e) => handleInput('down', e));
    window.addEventListener('mousemove', (e) => handleInput('move', e));
    window.addEventListener('touchstart', (e) => { if(e.target === canvas) e.preventDefault(); handleInput('down', e); }, { passive: false });
    window.addEventListener('touchmove', (e) => { if(e.target === canvas) e.preventDefault(); handleInput('move', e); }, { passive: false });
    window.addEventListener('keydown', (e) => { if(e.code === 'Space' && gameState === 'PLAYING') MiniGames[currentGameKey].onInput('down', canvas.width/2, canvas.height/2); });

</script>
</body>
